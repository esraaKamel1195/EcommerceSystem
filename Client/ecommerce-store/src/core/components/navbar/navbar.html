          >
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/store" routerLinkActive="active"> Products </a>
        </li>

      <ul class="navbar-nav">
        @if (!isUserAuthenticated()) {
          <li lass="nav-item me-3">
            <a class="nav-link" routerLink="/account/login">Login</a>
            <!-- <a class="nav-link" (click)="login()">Login</a> -->
          </li>
          <li class="nav-item me-3">
            <a class="nav-link" routerLink="/account/register">Signup</a>
          </li>
        }

        @let basket = basketService.basketSource$ | async;
        @if (isUserAuthenticated()) {
          <li lass="nav-item me-3">
            <a class="nav-link" role="button" routerLink="/basket">
              <i class="fa fa-shopping-cart"></i>
              @if (basket) {
                <span class="badge bg-danger">
                  {{ getBasketItemsCount(basket.items) }}
                </span>
              }
            </a>
          </li>
        }

        @if (isUserAuthenticated()) {
          <li class="nav-item me-3">
            <a class="nav-link" role="button" (click)="logout()"> Logout </a>
          </li>
