services:
  catalog.api:
    image: ${DOCKER_REGISTRY-}catalogapi
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.API/Dockerfile
    ports:
     - "8000:8000"
    depends_on:
     - catalogdb
    environment:
     - "DatabaseSettings__ConnectionString=mongodb://catalogdb:27017?readPreference=primary&ssl=false"
     - "DatabaseSettings__DatabaseName=catalogdb"
     - "DatabaseSettings__ProductsCollectionName=Products"
     - "DatabaseSettings__BrandsCollectionName=Brands"
     - "DatabaseSettings__TypesCollectionName=Types"

  catalogdb:
    image: mongo
    container_name: catalogdb
    ports:
     - "27017:27017"
    volumes:
     - catalogdata:/data/db
  basketdb:
    image: redis:alpine
    container_name: basketdb
    restart: always
    ports:
     - "6379:6379"
    volumes:
     - basketdata:/data/db
  discountdb:
    image: postgres:13-alpine
    container_name: discountdb
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password@123
      - POSTGRES_DB=discountdb
    ports:
      - "5432:5432"
    volumes:
      - discountdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d discountdb"]
      interval: 10s
      timeout: 5s
      retries: 5
  orderdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: orderdb
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "password@123"
    restart: always
    ports:
      - "1433:1433"
    volumes:
      - orderdb-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'password@123' -Q 'select 1'"]
      interval: 10s
      timeout: 10s
      retries: 3
    
  rabbitmq:
     image: rabbitmq:3-management-alpine
     container_name: rabbitmq
     restart: always
     ports:
       - "5672:5672"
       - "15672:15672"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
       - PGADMIN_DEFAULT_EMAIL=admin@ecommerce.com
       - PGADMIN_DEFAULT_PASSWORD=admin@123
    restart: always
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/root/.pgadmin
      
  basket.api:
    image: ${DOCKER_REGISTRY-}basketapi
    build:
      context: .
      dockerfile: Services/Basket/Basket.Api/Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      - basketdb
      - rabbitmq
    environment:
      - "ASPNETCORE_ENVIRONMENT=http://+:8000"
      - "CacheSettings__connectionString=basketdb:6379"
      - "GrpcSettings__DiscountUrl=http://discount.api:8080"
      - "EventBusSettings__HostAddress=amqp://guest:guest@localhost:5672"
  
  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: always
    command: -H unix:///var/run/docker.sock
    ports:
      - 8005:8000
      - 9000:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  discount.api:
    image: ${DOCKER_REGISTRY-}discountapi
    build:
      context: .
      dockerfile: Services/Discount/Discount.API/Dockerfile
    container_name: discount.api
    ports:
      - "8002:8000"
    depends_on:
       discountdb:
           condition: service_healthy
    environment:
      - "DatabaseSettings__ConnectionString=Host=discountdb;Port=5432;Database=discountdb;Username=admin;Password=password@123"
        
  ordering.api:
    image: ${DOCKER_REGISTRY-}orderingapi
    build:
      context: .
      dockerfile: Services/Ordering/Ordering.Api/Dockerfile
    container_name: ordering.api
    ports:
      - "8003:8000"
    depends_on:
      - orderdb
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - "ConnectionStrings__OrderingConnectionString=Server=orderdb;Database=orderDb2;User Id=sa;Password=password@123;TrustServerCertificate=true;"
      - "EventBusSettings__HostAddress=amqp://guest:guest@localhost:5672"

  ocelt.apigateway:
    image: ${DOCKER_REGISTRY-}oceltapigateway
    build:
      context: .
      dockerfile: API.Gateway/Ocelt.APIGateway/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - catalog.api
      - basket.api
      - discount.api
      - ordering.api
    ports:
      - "8010:8080"

volumes:
  catalogdata:
  basketdata:
  portainer_data:
  discountdata:
  pgadmin_data:
  orderdb-data:
